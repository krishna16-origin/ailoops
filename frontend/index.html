<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximus</title>
    
    <!-- Math and Syntax Highlighting CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <!-- 3D Prototype Libraries: OpenCASCADE, xeokit, PhysX, and Three.js for Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/opencascade.js/dist/opencascade.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xeokit/xeokit-sdk/dist/xeokit-sdk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/physx-js@1.0.0/dist/physx.release.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --bg-preview: #1a1a1a;
            --bg-input: #2f2f2f;
            --bg-hover: #2f2f2f;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --accent: #10a37f;
            --border-color: rgba(255, 255, 255, 0.1);
            --transition-bezier: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            inset: 0;
            background-color: var(--bg-main);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s var(--transition-bezier), visibility 0.8s;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo-container {
            animation: splashPulse 2s infinite ease-in-out;
            margin-bottom: 24px;
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            color: var(--text-primary);
        }

        @keyframes splashPulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .splash-text {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-primary);
            opacity: 0.8;
        }

        /* History Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 10px;
            border-right: 1px solid var(--border-color);
            transition: width 0.3s var(--transition-bezier), padding 0.3s var(--transition-bezier), opacity 0.3s var(--transition-bezier);
            overflow-x: hidden;
            white-space: nowrap;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            border-right: none;
            opacity: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .new-chat-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-settings {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .sidebar-setting-item input[type="number"], .sidebar-setting-item select {
            background-color: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid transparent;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
            transition: background 0.2s, border-color 0.2s;
        }
        
        .sidebar-setting-item input[type="number"]:hover, .sidebar-setting-item select:hover {
            background-color: var(--bg-hover);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .sidebar-setting-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Preview Sidebar (The new Right Side Bar for Rendered Prototypes) */
        .preview-sidebar {
            width: 450px;
            background-color: var(--bg-preview);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s var(--transition-bezier), opacity 0.3s var(--transition-bezier);
            overflow: hidden;
            flex-shrink: 0;
            z-index: 5;
        }

        .preview-sidebar.collapsed {
            width: 0;
            opacity: 0;
            border-left: none;
        }

        .preview-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            font-weight: 600;
            color: var(--text-primary);
            background-color: var(--bg-sidebar);
        }

        .preview-header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--accent);
        }

        .preview-content {
            flex: 1;
            background-color: #000000; /* Dark background optimal for 3D */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Iframe for sandboxing 3D execution safely */
        .preview-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-content svg {
            max-width: 100%;
            height: auto;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        /* Header / Controls */
        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-content {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-bottom: 150px;
        }

        .opening-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        .mono-logo-container {
            margin-bottom: 24px;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            animation: popFadeIn 0.8s var(--transition-bezier) forwards;
        }

        .mono-logo {
            width: 72px;
            height: 72px;
            color: var(--text-primary);
        }

        .swirl-spin {
            animation: spin 3s linear infinite;
        }

        .opening-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(15px);
            animation: slideFadeIn 0.8s var(--transition-bezier) 0.15s forwards;
        }

        .opening-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            opacity: 0;
            transform: translateY(15px);
            animation: slideFadeIn 0.8s var(--transition-bezier) 0.3s forwards;
        }

        @keyframes popFadeIn {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row {
            display: flex;
            width: 100%;
            opacity: 0;
            transform: translateY(15px);
            animation: slideFadeIn 0.5s var(--transition-bezier) forwards;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.assistant { justify-content: flex-start; }

        .message-bubble {
            max-width: 85%;
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
        }

        .user .message-bubble {
            background-color: var(--bg-input);
            border-radius: 24px 24px 6px 24px;
            white-space: pre-wrap;
        }

        .assistant .message-bubble {
            background-color: transparent;
            border-radius: 8px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 0;
        }

        .assistant-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .assistant-logo {
            width: 24px;
            height: 24px;
            padding: 4px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        .message-text { word-break: break-word; }
        .message-text p { margin-bottom: 12px; }
        .message-text h1, .message-text h2, .message-text h3 { margin: 20px 0 10px 0; color: #fff; }
        
        /* Hidden code implementation for Prototypes */
        .prototype-card {
            margin: 16px 0;
            border-radius: 8px;
            border: 1px solid var(--accent) !important;
            background-color: rgba(16, 163, 127, 0.05);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .prototype-card:hover {
            background-color: rgba(16, 163, 127, 0.15);
        }
        .prototype-card-text {
            color: var(--accent);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Expanded Prototype Modal */
        .expanded-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s var(--transition-bezier), visibility 0.3s;
        }

        .expanded-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .expanded-modal {
            width: 100%;
            height: 100%;
            max-width: 1600px;
            background-color: var(--bg-preview);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            transform: scale(1);
            transition: transform 0.3s var(--transition-bezier);
        }

        .expanded-overlay.hidden .expanded-modal {
            transform: scale(0.95);
        }

        .expanded-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .expanded-header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: var(--text-primary);
        }

        .expanded-content {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .expanded-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .expanded-content svg {
            max-width: 100%;
            height: auto;
        }

        /* Goal Progress Indicator */
        .goal-status {
            font-size: 12px;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: var(--bg-input);
            border-radius: 6px;
            width: fit-content;
            margin-top: 8px;
            border: 1px solid var(--border-color);
        }

        /* Input Area */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            background: linear-gradient(180deg, rgba(33,33,33,0) 0%, var(--bg-main) 40%);
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-input);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: flex-end;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: border-color 0.3s;
        }

        .input-box:focus-within { border-color: rgba(255, 255, 255, 0.3); }
        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            outline: none;
            max-height: 200px;
            padding: 8px 4px;
            line-height: 1.5;
        }

        .send-btn {
            background: var(--text-primary);
            color: var(--bg-main);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-left: 12px;
            margin-bottom: 4px;
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: var(--text-primary);
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo-container">
            <svg class="splash-logo swirl-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 12c-1.657 0-3 1.343-3 3 0 1.657 1.343 3 3 3 3.314 0 6-2.686 6-6 0-3.314-2.686-6-6-6-4.97 0-9 4.03-9 9 0 4.97 4.03 9 9 9"></path>
            </svg>
        </div>
        <div class="splash-text">Maximus- Beyond limits</div>
    </div>

    <!-- Main History Sidebar (Left) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="icon-btn" onclick="toggleSidebar()" title="Close History Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            <button class="new-chat-btn" onclick="startNewChat()">
                <span>New session</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
            </button>
        </div>
        <div class="history-list" id="historyList"></div>
        
        <div class="sidebar-settings">
            <div class="sidebar-setting-item">
                <label>Model</label>
                <select id="modelType">
                    <option value="fast">Horus</option>
                    <option value="balanced" selected>Osiris</option>
                    <option value="reasoning">Amun-Ra</option>
                </select>
            </div>
            <div class="sidebar-setting-item">
                <label>Temperature</label>
                <input type="number" id="tempSetting" value="0.7" step="0.1" min="0" max="1">
            </div>
            <div class="sidebar-setting-item">
                <label>Max Iterations</label>
                <input type="number" id="iterSetting" value="2" min="1" max="10">
            </div>
            <div class="sidebar-setting-item">
                <label>Stream Response</label>
                <input type="checkbox" id="streamSetting" checked>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <!-- Toggle History -->
                <button class="icon-btn sidebar-toggle-main" onclick="toggleSidebar()" title="Open History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
                <!-- Toggle 3D Prototype Panel -->
                <button class="icon-btn" onclick="togglePreviewSidebar()" title="Toggle Prototype Preview Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 12 12 17 22 12"></polyline>
                        <polyline points="2 17 12 22 22 17"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="opening-scene" id="openingScene">
                <div class="mono-logo-container">
                    <svg class="mono-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 12 12 17 22 12"></polyline>
                        <polyline points="2 17 12 22 22 17"></polyline>
                    </svg>
                </div>
                <h1 class="opening-title">How can I help you achieve your goal?</h1>
                <p class="opening-subtitle">Execution destroys all excuses</p>
            </div>
            <div class="chat-content" id="chatContent" style="display: none;"></div>
        </div>

        <!-- Input Container -->
        <div class="input-container">
            <div class="input-box">
                <textarea id="userInput" rows="1" placeholder="Describe your objective..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- NEW: Dedicated 3D Prototype Preview Sidebar (Right Side of Chat) -->
    <div class="preview-sidebar collapsed" id="previewSidebar">
        <div class="preview-header">
            <div class="preview-header-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7-4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                </svg>
                Prototype Render
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="icon-btn" onclick="openExpandedView()" title="Expand Fullscreen">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
                <button class="icon-btn" onclick="togglePreviewSidebar()" title="Close Prototype Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Render Container -->
        <div id="previewContent" class="preview-content"></div>
    </div>

    <!-- Expanded Overlay for Fullscreen 3D View -->
    <div class="expanded-overlay hidden" id="expandedOverlay">
        <div class="expanded-modal">
            <div class="expanded-header">
                <div class="expanded-header-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7-4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    </svg>
                    <span>Expanded Prototype View</span>
                </div>
                <button class="icon-btn" onclick="closeExpandedView()" title="Close Expanded View">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="expanded-content" id="expandedContent"></div>
        </div>
    </div>

    <!-- Markdown & Math Parsers -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>

    <script>
        marked.use(markedKatex({ throwOnError: false }));

        // Variables for Global Scope and Chat memory
        const API_URL = 'https://ailoops.onrender.com/chat';
        let currentSessionId = generateUUID();
        let isWaitingForResponse = false;
        
        // Cache prototypes universally so we can render them immediately in the sidebar
        let prototypeCount = 0;
        window.generatedPrototypes = {};

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const previewSidebar = document.getElementById('previewSidebar');
        const previewContent = document.getElementById('previewContent');
        const chatContainer = document.getElementById('chatContainer');
        const chatContent = document.getElementById('chatContent');
        const openingScene = document.getElementById('openingScene');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Sidebar Toggles
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }
        function togglePreviewSidebar() { previewSidebar.classList.toggle('collapsed'); }

        let currentActiveProtoId = null;

        // Shared execution logic to inject the generated code securely
        function executePrototypeInContainer(id, container) {
            const proto = window.generatedPrototypes[id];
            if (!proto) return;
            
            container.innerHTML = ''; // Reset rendering surface

            if (proto.lang === 'svg') {
                container.innerHTML = DOMPurify.sanitize(proto.code, { USE_PROFILES: { svg: true, svgFilters: true } });
            } else {
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                container.appendChild(iframe);

                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <script src="https://cdn.jsdelivr.net/npm/opencascade.js/dist/opencascade.js"><\/script>
                        <script src="https://cdn.jsdelivr.net/npm/@xeokit/xeokit-sdk/dist/xeokit-sdk.min.js"><\/script>
                        <script src="https://cdn.jsdelivr.net/npm/physx-js@1.0.0/dist/physx.release.js"><\/script>
                        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
                        <style>
                            body { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
                            canvas { display: block; max-width: 100%; max-height: 100%; outline: none; }
                            svg { max-width: 100%; max-height: 100%; }
                        </style>
                    </head>
                    <body>
                        ${proto.lang === 'html' ? proto.code : ''}
                        ${['javascript', 'js', '3d', 'xeokit', 'opencascade', 'physx'].includes(proto.lang) ? `<script>${proto.code}<\/script>` : ''}
                    </body>
                    </html>
                `);
                doc.close();
            }
        }

        // Expanded View Engine
        window.openExpandedView = function(id = currentActiveProtoId) {
            if (!id) return;
            currentActiveProtoId = id;
            
            const overlay = document.getElementById('expandedOverlay');
            const content = document.getElementById('expandedContent');
            
            overlay.classList.remove('hidden');
            executePrototypeInContainer(id, content);
        };
        
        window.closeExpandedView = function() {
            const overlay = document.getElementById('expandedOverlay');
            const content = document.getElementById('expandedContent');
            
            overlay.classList.add('hidden');
            setTimeout(() => { content.innerHTML = ''; }, 300); // Clear memory after transition
        };

        // Main Execution Engine for viewing the Prototype dynamically in the side panel
        window.openPreviewSidebarWithId = function(id) {
            currentActiveProtoId = id;
            previewSidebar.classList.remove('collapsed');
            executePrototypeInContainer(id, previewContent);
        };

        // Custom Highlight Hook enforcing "DO NOT SHOW CODE" for prototypes
        function highlightCode(el) {
            el.querySelectorAll('pre code').forEach(codeEl => {
                const pre = codeEl.parentElement;
                if (pre.parentElement.classList.contains('code-card') || pre.parentElement.classList.contains('prototype-card')) return;

                const langClass = [...codeEl.classList].find(c => c.startsWith('language-'));
                const lang = langClass ? langClass.replace('language-', '') : 'text';

                // Intercept ANY code format used for 3D/UI Prototypes
                const isPrototype = ['html', 'javascript', 'js', 'svg', '3d', 'xeokit', 'opencascade', 'physx'].includes(lang);

                if (isPrototype) {
                    // DO NOT SHOW CODE:
                    // Hide traditional code element entirely
                    pre.hidden = true;
                    
                    // Register the prototype into memory
                    const protoId = 'proto_' + (prototypeCount++);
                    window.generatedPrototypes[protoId] = { code: codeEl.textContent, lang: lang };

                    // Inject the custom 'Prototype Ready' action card into Chat
                    const card = document.createElement('div');
                    card.className = 'prototype-card';
                    card.setAttribute('onclick', `openExpandedView('${protoId}')`);
                    card.innerHTML = `
                        <div class="prototype-card-text" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7-4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                </svg>
                                Rendered Prototype Generated - Click to Expand
                            </div>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </div>
                    `;
                    pre.parentNode.insertBefore(card, pre);
                    pre.remove(); // Nuke the raw code from the chat interface

                    // Automatically open the side panel and render it
                    window.openPreviewSidebarWithId(protoId);
                    return; 
                }

                // If not a prototype snippet (e.g. standard python script), process visually normally
                hljs.highlightElement(codeEl);
                const card = document.createElement('div');
                card.className = 'code-card';
                
                const header = document.createElement('div');
                header.className = 'code-card-header';
                header.style.cssText = "display: flex; justify-content: space-between; align-items: center; background-color: #2a2a2a; padding: 8px 16px; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color);";
                header.innerHTML = `<span style="font-family: monospace; text-transform: lowercase;">${lang}</span>
                    <button class="copy-btn" type="button" style="background: transparent; border: none; color: var(--text-secondary); display: flex; gap: 6px; cursor: pointer;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>Copy</span>
                    </button>`;

                const copyBtn = header.querySelector('.copy-btn');
                const copyLabel = copyBtn.querySelector('span');
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(codeEl.textContent);
                    copyLabel.textContent = 'Copied!';
                    setTimeout(() => { copyLabel.textContent = 'Copy'; }, 1500);
                });

                pre.parentNode.insertBefore(card, pre);
                card.appendChild(header);
                
                pre.style.cssText = "background-color: #111; padding: 16px; overflow-x: auto; margin: 0; border: none;";
                codeEl.style.cssText = "background-color: transparent; padding: 0; font-size: 0.9em; border: none;";
                card.appendChild(pre);
            });
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
            if(textarea.value === '') textarea.style.height = 'auto';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function startNewChat() {
            currentSessionId = generateUUID();
            chatContent.innerHTML = '';
            chatContent.style.display = 'none';
            openingScene.style.display = 'flex';
            
            const newOpening = openingScene.cloneNode(true);
            openingScene.parentNode.replaceChild(newOpening, openingScene);
            
            userInput.value = '';
            autoResize(userInput);
            userInput.focus();
            
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = 'New Objective';
            historyList.prepend(item);
        }

        function appendMessage(role, text) {
            document.getElementById('openingScene').style.display = 'none';
            chatContent.style.display = 'flex';

            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (role === 'assistant') {
                const header = document.createElement('div');
                header.className = 'assistant-header';
                header.innerHTML = `
                    <svg class="assistant-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 12 12 17 22 12"></polyline>
                        <polyline points="2 17 12 22 22 17"></polyline>
                    </svg>
                    Goal-Oriented AI
                `;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-text';
                contentDiv.innerHTML = text ? marked.parse(text) : '';
                if (text) highlightCode(contentDiv);

                const statusDiv = document.createElement('div');
                statusDiv.className = 'goal-status';
                statusDiv.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="swirl-spin">
                        <path d="M12 12c-1.657 0-3 1.343-3 3 0 1.657 1.343 3 3 3 3.314 0 6-2.686 6-6 0-3.314-2.686-6-6-6-4.97 0-9 4.03-9 9 0 4.97 4.03 9 9 9"></path>
                    </svg>
                    <span class="goal-text">Initializing parameters...</span>
                `;

                bubble.appendChild(header);
                bubble.appendChild(statusDiv);
                bubble.appendChild(contentDiv);
            } else {
                bubble.innerText = text;
            }

            row.appendChild(bubble);
            chatContent.appendChild(row);
            scrollToBottom();
            
            return role === 'assistant' ? bubble : null;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isWaitingForResponse) return;

            appendMessage('user', text);
            userInput.value = '';
            autoResize(userInput);
            sendBtn.disabled = true;
            isWaitingForResponse = true;

            const modelType = document.getElementById('modelType').value;
            const temp = parseFloat(document.getElementById('tempSetting').value);
            const maxIters = parseInt(document.getElementById('iterSetting').value);
            const useStream = document.getElementById('streamSetting').checked;

            const payload = {
                message: text,
                session_id: currentSessionId,
                model_type: modelType,
                stream: useStream,
                temperature: temp,
                max_iterations: maxIters
            };

            const assistantBubble = appendMessage('assistant', '');
            const textContainer = assistantBubble.querySelector('.message-text');
            const statusIndicator = assistantBubble.querySelector('.goal-status');
            const goalText = statusIndicator.querySelector('.goal-text');

            function setGoalStatus(label) {
                if (!goalText) return;
                goalText.style.opacity = 0;
                setTimeout(() => {
                    goalText.textContent = label;
                    goalText.style.opacity = 1;
                    goalText.style.transition = "opacity 0.3s";
                }, 150);
            }

            let assistantFullText = '';

            if (useStream) {
                textContainer.innerHTML = '<span class="typing-cursor"></span>';
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Network response error');

                if (useStream) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const events = buffer.split('\n\n');
                        buffer = events.pop();

                        for (const event of events) {
                            const line = event.trim();
                            if (!line.startsWith('data:')) continue;

                            const jsonStr = line.slice(5).trim();
                            try {
                                const parsed = JSON.parse(jsonStr);
                                if (parsed.type === 'status') {
                                    setGoalStatus(parsed.label);
                                } else if (parsed.assistant_message) {
                                    assistantFullText += parsed.assistant_message;
                                    textContainer.innerHTML = marked.parse(assistantFullText) + '<span class="typing-cursor"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error('SSE JSON failure:', jsonStr, e);
                            }
                        }
                    }
                    
                    textContainer.innerHTML = marked.parse(assistantFullText);
                    highlightCode(textContainer);

                } else {
                    const data = await response.json();
                    assistantFullText = data.response;
                    textContainer.innerHTML = marked.parse(assistantFullText);
                    highlightCode(textContainer);
                }

                statusIndicator.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> <span style="color:var(--text-secondary)">Objective executed successfully</span>`;
                statusIndicator.style.background = "transparent";
                statusIndicator.style.border = "none";
                statusIndicator.style.padding = "0";

            } catch (error) {
                statusIndicator.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> <span style="color:#ef4444">Connection Failed</span>`;
                textContainer.innerHTML = `<span style="color: var(--text-secondary)">Ensure your backend is running.</span>`;
            } finally {
                sendBtn.disabled = false;
                isWaitingForResponse = false;
                userInput.focus();
                
                const cursor = textContainer.querySelector('.typing-cursor');
                if(cursor) cursor.remove();
            }
        }
        
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                if (splash) {
                    splash.classList.add('hidden');
                    setTimeout(() => splash.style.display = 'none', 800);
                }
                document.getElementById('userInput').focus();
            }, 1600);
        };
    </script>
</body>
</html>
