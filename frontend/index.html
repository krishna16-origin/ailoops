<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root { 
            --bg-main:#212121; 
            --bg-sidebar:#171717; 
            --bg-input:#2f2f2f; 
            --bg-hover:#2f2f2f; 
            --text-primary:#ececec; 
            --text-secondary:#b4b4b4; 
            --accent:#10a37f; 
            --border-color:rgba(255,255,255,0.1); 
            --transition-bezier:cubic-bezier(0.2,0.8,0.2,1); 
            --canvas-bg: #1e1e1e;
        }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif; }
        body { background-color:var(--bg-main); color:var(--text-primary); display:flex; height:100vh; overflow:hidden; }
        
        /* Splash Screen */
        .splash-screen { position:fixed; inset:0; background-color:var(--bg-main); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.8s var(--transition-bezier), visibility 0.8s; }
        .splash-screen.hidden { opacity:0; visibility:hidden; }
        .splash-logo-container { animation:splashPulse 2s infinite ease-in-out; margin-bottom:24px; }
        .splash-logo { width:80px; height:80px; color:var(--text-primary); }
        @keyframes splashPulse { 0%{transform:scale(0.95);opacity:0.7;} 50%{transform:scale(1.05);opacity:1;} 100%{transform:scale(0.95);opacity:0.7;} }
        .splash-text { font-size:18px; font-weight:500; letter-spacing:3px; color:var(--text-primary); opacity:0.8; }

        /* Sidebar */
        .sidebar { width:260px; background-color:var(--bg-sidebar); display:flex; flex-direction:column; padding:10px; border-right:1px solid var(--border-color); transition:width 0.3s var(--transition-bezier), padding 0.3s var(--transition-bezier), opacity 0.3s var(--transition-bezier); overflow-x:hidden; white-space:nowrap; flex-shrink:0; }
        .sidebar.collapsed { width:0; padding-left:0; padding-right:0; border-right:none; opacity:0; }
        .sidebar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:10px; }
        
        .nav-sections { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; font-size: 14px; font-weight: 500; }
        .nav-item:hover { background-color: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background-color: var(--bg-hover); color: var(--text-primary); }
        .nav-item svg { width: 18px; height: 18px; }

        .icon-btn { background:transparent; border:none; color:var(--text-secondary); cursor:pointer; padding:8px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:background 0.2s, color 0.2s; }
        .icon-btn:hover { background-color:var(--bg-hover); color:var(--text-primary); }
        
        .new-chat-btn { flex:1; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background-color:transparent; color:var(--text-primary); border:1px solid var(--border-color); border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; transition:background 0.2s; }
        .new-chat-btn:hover { background-color:var(--bg-hover); }
        
        .history-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
        .history-item { padding:12px; border-radius:8px; cursor:pointer; font-size:14px; overflow:hidden; text-overflow:ellipsis; color:var(--text-secondary); transition:background 0.2s, color 0.2s; }
        .history-item:hover { background-color:var(--bg-hover); color:var(--text-primary); }
        
        .sidebar-settings { margin-top:auto; padding-top:16px; border-top:1px solid var(--border-color); display:flex; flex-direction:column; gap:12px; }
        .sidebar-setting-item { display:flex; justify-content:space-between; align-items:center; color:var(--text-secondary); font-size:13px; }
        .sidebar-setting-item input[type="number"] { width:50px; background-color:var(--bg-main); color:var(--text-primary); border:1px solid transparent; padding:4px 8px; border-radius:6px; outline:none; transition:background 0.2s, border-color 0.2s; }
        .sidebar-setting-item input[type="number"]:hover, .sidebar-setting-item input[type="number"]:focus { background-color:var(--bg-hover); border-color:rgba(255,255,255,0.2); }
        .sidebar-setting-item input[type="checkbox"] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; }
        .sidebar-setting-item select { background-color:var(--bg-main); color:var(--text-primary); border:1px solid transparent; padding:4px 8px; border-radius:6px; outline:none; font-size:13px; cursor:pointer; transition:background 0.2s, border-color 0.2s; }
        .sidebar-setting-item select:hover, .sidebar-setting-item select:focus { background-color:var(--bg-hover); border-color:rgba(255,255,255,0.2); }

        /* Main Content */
        .main-content { flex:1; display:flex; flex-direction:row; position:relative; min-width:0; }
        .chat-view { flex:1; display:flex; flex-direction:column; position:relative; min-width:0; }
        
        .header { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; z-index:10; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .sidebar-toggle-main { display:none; opacity:0; transform:scale(0.8); transition:opacity 0.3s var(--transition-bezier), transform 0.3s var(--transition-bezier); }
        .sidebar.collapsed ~ .main-content .sidebar-toggle-main { display:flex; opacity:1; transform:scale(1); }

        .chat-container { flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; scroll-behavior:smooth; }
        .chat-content { width:100%; max-width:800px; padding:20px; display:flex; flex-direction:column; gap:32px; padding-bottom:150px; }
        
        /* Message Styles */
        .message-row { display:flex; width:100%; opacity:0; transform:translateY(15px); animation:slideFadeIn 0.5s var(--transition-bezier) forwards; }
        .message-row.user { justify-content:flex-end; }
        .message-row.assistant { justify-content:flex-start; }
        .message-bubble { max-width:85%; padding:16px 20px; font-size:15px; line-height:1.6; }
        .user .message-bubble { background-color:var(--bg-input); border-radius:24px 24px 6px 24px; white-space:pre-wrap; }
        .assistant .message-bubble { background-color:transparent; border-radius:8px; color:var(--text-primary); display:flex; flex-direction:column; gap:12px; padding-left:0; }
        .assistant-header { display:flex; align-items:center; gap:12px; font-weight:600; font-size:16px; }
        .assistant-logo { width:24px; height:24px; padding:4px; border-radius:50%; border:1px solid var(--border-color); }
        .message-text { word-break:break-word; }
        .message-text p { margin-bottom:12px; }
        .message-text p:last-child { margin-bottom:0; }
        
        /* Thinking Block */
        .thinking-block { margin-top:8px; }
        .thinking-toggle { background:none; border:none; padding:0; font-size:13px; font-family:inherit; color:var(--text-secondary); cursor:pointer; }
        .thinking-toggle:hover { color:var(--text-primary); text-decoration:underline; }
        .thinking-toggle.shimmer {
            background-image: linear-gradient(90deg, var(--text-secondary) 0%, var(--text-secondary) 35%, var(--text-primary) 50%, var(--text-secondary) 65%, var(--text-secondary) 100%);
            background-size: 200% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: thinkingShimmer 1.6s linear infinite;
        }
        @keyframes thinkingShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .thinking-content { display:none; margin:12px 0 12px 12px; padding-left:24px; border-left:1px solid var(--border-color); font-size:14px; line-height:1.6; color:var(--text-secondary); }
        .thinking-content.expanded { display:block; }
        .thought-item { position: relative; margin-bottom: 16px; }
        .thought-icon-wrapper { position: absolute; left: -36px; top: 0px; width: 24px; height: 24px; background-color: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 2; }
        .thought-icon-wrapper svg { width: 20px; height: 20px; color: var(--text-secondary); }
        .thought-content { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
        .thought-content.expanded { -webkit-line-clamp: unset; }

        /* Input Box */
        .input-container { position:absolute; bottom:0; left:0; width:100%; padding:24px; background:linear-gradient(180deg, rgba(33,33,33,0) 0%, var(--bg-main) 40%); display:flex; justify-content:center; }
        .input-wrapper { width:100%; max-width:800px; display:flex; flex-direction:column; gap:8px; }
        .input-controls { display: flex; gap: 8px; padding: 0 8px; }
        .control-pill { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 16px; padding: 4px 12px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .control-pill:hover { border-color: rgba(255,255,255,0.3); color: var(--text-primary); }
        .control-pill select { background: transparent; border: none; color: inherit; font-size: inherit; outline: none; cursor: pointer; }
        
        .input-box { background-color:var(--bg-input); border-radius:24px; border:1px solid var(--border-color); display:flex; align-items:flex-end; padding:12px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:border-color 0.3s; }
        .input-box:focus-within { border-color:rgba(255,255,255,0.3); }
        .input-box textarea { flex:1; background:transparent; border:none; color:var(--text-primary); font-size:16px; resize:none; outline:none; max-height:200px; padding:8px 4px; line-height:1.5; }
        .send-btn { background:var(--text-primary); color:var(--bg-main); border:none; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:opacity 0.2s, transform 0.2s var(--transition-bezier); margin-left:12px; margin-bottom:4px; }
        .send-btn:disabled { opacity:0.3; cursor:not-allowed; }

        /* Canvas View */
        .canvas-view { width: 50%; border-left: 1px solid var(--border-color); background-color: var(--canvas-bg); display: none; flex-direction: column; }
        .canvas-view.active { display: flex; }
        .canvas-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); }
        .canvas-tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; }
        .canvas-tab { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .canvas-tab.active { background: var(--bg-input); color: var(--text-primary); }
        .canvas-content { flex: 1; overflow: hidden; position: relative; }
        .canvas-code { position: absolute; inset: 0; padding: 20px; overflow: auto; font-family: 'Fira Code', monospace; font-size: 14px; }
        .canvas-preview { position: absolute; inset: 0; background: white; display: none; }
        .canvas-preview.active { display: block; }
        .canvas-preview iframe { width: 100%; height: 100%; border: none; }
        .canvas-close { cursor: pointer; color: var(--text-secondary); }
        .canvas-close:hover { color: var(--text-primary); }

        @keyframes slideFadeIn { to { opacity:1; transform:translateY(0); } }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
        
        pre { background-color:#111; padding:16px; overflow-x:auto; border-radius:8px; margin: 12px 0; }
        code { font-family:'Courier New', Courier, monospace; }
        
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div id="splashScreen" class="splash-screen">
        <div class="splash-logo-container">
            <svg class="splash-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        </div>
        <div class="splash-text">MAXIMUS</div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="startNewChat()">
                <span>New Chat</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="icon-btn" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button>
        </div>

        <nav class="nav-sections">
            <div class="nav-item active" id="nav-chat" onclick="setMode('chat')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Chat</span>
            </div>
            <div class="nav-item" id="nav-code" onclick="setMode('code')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                <span>Code</span>
            </div>
        </nav>

        <div class="history-list" id="historyList"></div>

        <div class="sidebar-settings">
            <div class="sidebar-setting-item" id="sidebar-model-container">
                <span>Model</span>
                <select id="modelType">
                    <option value="reasoning">Reasoning (Nemotron)</option>
                    <option value="fast">Fast (DeepSeek)</option>
                </select>
            </div>
            <div class="sidebar-setting-item" id="sidebar-temp-container">
                <span>Temperature</span>
                <input type="number" id="tempSetting" value="0.7" step="0.1" min="0" max="1">
            </div>
            <div class="sidebar-setting-item">
                <span>Max Iterations</span>
                <input type="number" id="iterSetting" value="2" min="1" max="5">
            </div>
            <div class="sidebar-setting-item">
                <span>Stream</span>
                <input type="checkbox" id="streamSetting" checked>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="chat-view">
            <header class="header">
                <div class="header-left">
                    <button class="icon-btn sidebar-toggle-main" onclick="toggleSidebar()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                    <h2 id="view-title">Chat</h2>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="chat-content" id="chatContent">
                    <div class="opening-scene" id="openingScene">
                        <div class="mono-logo-container">
                            <svg class="mono-logo swirl-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                        </div>
                        <h1 class="opening-title">How can I help you today?</h1>
                        <p class="opening-subtitle">Intelligent goal-oriented assistance.</p>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-controls" id="inputControls">
                        <div class="control-pill" id="model-pill">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10h-10V2z"></path></svg>
                            <select id="inputModelType">
                                <option value="glm">GLM (Fast)</option>
                                <option value="kimi">Kimi (Reasoning)</option>
                            </select>
                        </div>
                        <div class="control-pill" id="effort-pill">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            <select id="reasoningLevel">
                                <option value="low">Low Effort</option>
                                <option value="medium" selected>Medium Effort</option>
                                <option value="high">High Effort</option>
                                <option value="max">Max Effort</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-box">
                        <textarea id="userInput" placeholder="Message Maximus..." rows="1" oninput="autoResize(this)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="canvas-view" id="canvasView">
            <div class="canvas-header">
                <div class="canvas-tabs">
                    <div class="canvas-tab active" id="tab-code" onclick="setCanvasTab('code')">Code</div>
                    <div class="canvas-tab" id="tab-preview" onclick="setCanvasTab('preview')">Preview</div>
                </div>
                <div class="canvas-close" onclick="closeCanvas()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
            <div class="canvas-content">
                <div class="canvas-code" id="canvasCode"></div>
                <div class="canvas-preview" id="canvasPreview">
                    <iframe id="previewFrame"></iframe>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        let currentMode = 'chat';
        let currentSessionId = Math.random().toString(36).substring(2, 15);
        let isWaitingForResponse = false;
        let lastCode = '';
        let lastLang = '';

        const chatContainer = document.getElementById('chatContainer');
        const chatContent = document.getElementById('chatContent');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');
        const canvasView = document.getElementById('canvasView');

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${mode}`).classList.add('active');
            document.getElementById('view-title').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
            
            const sidebarModel = document.getElementById('sidebar-model-container');
            const sidebarTemp = document.getElementById('sidebar-temp-container');
            const inputControls = document.getElementById('inputControls');
            
            if (mode === 'code') {
                sidebarModel.style.display = 'none';
                sidebarTemp.style.display = 'none';
                inputControls.style.display = 'flex';
                userInput.placeholder = "Write code with Maximus...";
            } else {
                sidebarModel.style.display = 'flex';
                sidebarTemp.style.display = 'flex';
                inputControls.style.display = 'none';
                userInput.placeholder = "Message Maximus...";
                closeCanvas();
            }
            startNewChat();
        }

        // Initialize UI
        setMode('chat');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        function startNewChat() {
            currentSessionId = Math.random().toString(36).substring(2, 15);
            chatContent.innerHTML = `
                <div class="opening-scene" id="openingScene">
                    <div class="mono-logo-container">
                        <svg class="mono-logo swirl-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    </div>
                    <h1 class="opening-title">${currentMode === 'chat' ? 'How can I help you today?' : 'What should we build?'}</h1>
                    <p class="opening-subtitle">${currentMode === 'chat' ? 'Intelligent goal-oriented assistance.' : 'Expert coding with reasoning.'}</p>
                </div>
            `;
            closeCanvas();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(role, text) {
            const openingScene = document.getElementById('openingScene');
            if (openingScene) openingScene.remove();

            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            if (role === 'user') {
                row.innerHTML = `<div class="message-bubble">${text}</div>`;
            } else {
                row.innerHTML = `
                    <div class="message-bubble">
                        <div class="assistant-header">
                            <svg class="assistant-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                            <span>Maximus</span>
                        </div>
                        <div class="thinking-block" style="display: none;">
                            <button class="thinking-toggle">Thinking</button>
                            <div class="thinking-content"></div>
                        </div>
                        <div class="message-text"></div>
                    </div>
                `;
            }
            
            chatContent.appendChild(row);
            scrollToBottom();
            return row;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isWaitingForResponse) return;

            appendMessage('user', text);
            userInput.value = '';
            autoResize(userInput);
            sendBtn.disabled = true;
            isWaitingForResponse = true;

            const endpoint = currentMode === 'chat' ? '/chat' : '/code-chat';
            const payload = currentMode === 'chat' ? {
                message: text,
                session_id: currentSessionId,
                model_type: document.getElementById('modelType').value,
                stream: document.getElementById('streamSetting').checked,
                temperature: parseFloat(document.getElementById('tempSetting').value),
                max_iterations: parseInt(document.getElementById('iterSetting').value)
            } : {
                message: text,
                session_id: currentSessionId,
                model: document.getElementById('inputModelType').value,
                reasoning_level: document.getElementById('reasoningLevel').value,
                stream: document.getElementById('streamSetting').checked,
                temperature: 0.2
            };

            const assistantBubble = appendMessage('assistant', '');
            const textContainer = assistantBubble.querySelector('.message-text');
            const thinkingBlock = assistantBubble.querySelector('.thinking-block');
            const thinkingToggle = thinkingBlock.querySelector('.thinking-toggle');
            const thinkingContent = thinkingBlock.querySelector('.thinking-content');
            const thinkingStartTime = Date.now();

            let thinkingDone = false;
            let answerStarted = false;
            let assistantFullText = '';

            function addThought(label, detail) {
                if (thinkingDone) return;
                thinkingBlock.style.display = 'block';
                thinkingToggle.textContent = label || 'Thinking';
                thinkingToggle.classList.add('shimmer');

                const item = document.createElement('div');
                item.className = 'thought-item';
                item.innerHTML = `
                    <div class="thought-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div class="thought-content">${detail || label}</div>
                `;
                thinkingContent.appendChild(item);
                scrollToBottom();
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (payload.stream) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const events = buffer.split('\n\n');
                        buffer = events.pop();

                        for (const event of events) {
                            const line = event.trim();
                            if (!line.startsWith('data:')) continue;
                            const jsonStr = line.slice(5).trim();
                            try {
                                const parsed = JSON.parse(jsonStr);
                                if (parsed.type === 'status') {
                                    addThought(parsed.label, parsed.detail);
                                } else if (parsed.assistant_message) {
                                    if (!answerStarted) {
                                        answerStarted = true;
                                        thinkingDone = true;
                                        thinkingToggle.classList.remove('shimmer');
                                        thinkingToggle.textContent = `Thought for ${Math.round((Date.now() - thinkingStartTime)/1000)}s`;
                                    }
                                    assistantFullText += parsed.assistant_message;
                                    textContainer.innerHTML = marked.parse(assistantFullText);
                                    scrollToBottom();
                                } else if (parsed.type === 'code_result') {
                                    handleCodeResult(parsed);
                                }
                            } catch (e) {}
                        }
                    }
                } else {
                    const data = await response.json();
                    textContainer.innerHTML = marked.parse(data.response);
                    if (data.code) handleCodeResult(data);
                }
            } catch (error) {
                console.error('Error:', error);
                textContainer.innerHTML = 'Error communicating with backend.';
            } finally {
                sendBtn.disabled = false;
                isWaitingForResponse = false;
                hljs.highlightAll();
            }
        }

        function handleCodeResult(data) {
            if (!data.code) return;
            lastCode = data.code;
            lastLang = data.language;
            
            canvasView.classList.add('active');
            document.getElementById('canvasCode').innerHTML = `<pre><code class="language-${data.language}">${escapeHtml(data.code)}</code></pre>`;
            hljs.highlightElement(document.getElementById('canvasCode').querySelector('code'));
            
            const previewTab = document.getElementById('tab-preview');
            if (data.show_preview) {
                previewTab.style.display = 'block';
                updatePreview(data.code);
            } else {
                previewTab.style.display = 'none';
                setCanvasTab('code');
            }
        }

        function updatePreview(code) {
            const iframe = document.getElementById('previewFrame');
            const blob = new Blob([code], { type: 'text/html' });
            iframe.src = URL.createObjectURL(blob);
        }

        function setCanvasTab(tab) {
            document.querySelectorAll('.canvas-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'code') {
                document.getElementById('canvasCode').style.display = 'block';
                document.getElementById('canvasPreview').classList.remove('active');
            } else {
                document.getElementById('canvasCode').style.display = 'none';
                document.getElementById('canvasPreview').classList.add('active');
            }
        }

        function closeCanvas() {
            canvasView.classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                if (splash) {
                    splash.classList.add('hidden');
                    setTimeout(() => splash.style.display = 'none', 800);
                }
                userInput.focus();
            }, 1600);
        };
    </script>
</body>
</html>
